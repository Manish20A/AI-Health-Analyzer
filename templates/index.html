<!DOCTYPE html>
<html>
<head>
<title>AI Health Analyzer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-6 text-center">
AI Health Analyzer
</h1>

<!-- ML Input Form -->
<form id="healthForm" class="grid grid-cols-2 gap-4">

<input name="age" placeholder="Age" required class="border p-2 rounded">

<select name="gender" class="border p-2 rounded">
<option>Male</option>
<option>Female</option>
</select>

<input name="height" placeholder="Height (meters)" required class="border p-2 rounded">

<input name="weight" placeholder="Weight (kg)" required class="border p-2 rounded">

<button type="submit" class="col-span-2 bg-blue-500 text-white p-2 rounded hover:bg-blue-600 transition">
Analyze
</button>

</form>

<!-- Prediction Results Section -->
<div id="resultsSection" class="hidden mt-6 p-6 bg-green-50 rounded shadow">

<h2 class="font-bold text-lg mb-4 text-center">Prediction Results</h2>

<div class="mb-4">
<p><b>BMI:</b> <span id="bmiValue"></span></p>
<p><b>Prediction:</b> <span id="predictionValue"></span></p>
<p><b>Confidence:</b> <span id="confidenceValue"></span></p>
<div class="w-full bg-gray-200 rounded-full h-4 mt-2">
  <div id="confidenceBar" class="bg-green-500 h-4 rounded-full" style="width:0%"></div>
</div>
</div>

<div class="mb-4 p-4 bg-blue-100 rounded">
<h3 class="font-semibold">Model Accuracy</h3>
<p id="accuracyValue"></p>
<div class="w-full bg-gray-200 rounded-full h-4 mt-2">
  <div id="accuracyBar" class="bg-blue-500 h-4 rounded-full" style="width:0%"></div>
</div>
</div>

<div class="mb-4 p-4 bg-purple-100 rounded">
<h3 class="font-semibold">Feature Importance</h3>
<canvas id="featureChart" height="150"></canvas>
</div>

<div class="mb-4 p-4 bg-yellow-100 rounded">
<h3 class="font-semibold">Confusion Matrix</h3>
<table id="confusionTable" class="table-auto border-collapse border border-gray-400 w-full text-center"></table>
</div>

</div>

</div>

<!-- POPUP CHATBOT -->
<button id="chatToggle"
class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition">
💬
</button>

<div id="chatWindow"
class="hidden fixed bottom-20 right-6 w-80 bg-white shadow-xl rounded-lg flex flex-col">

<div class="bg-green-500 text-white p-3 rounded-t-lg flex justify-between">
<span>AI Health Chat</span>
<button onclick="toggleChat()">✖</button>
</div>

<div id="chatBox" class="h-64 overflow-y-auto p-3 text-sm bg-gray-50"></div>

<div class="flex border-t">
<input id="chatInput"
class="flex-1 p-2 outline-none"
placeholder="Ask about health...">
<button onclick="sendMessage()"
class="bg-green-500 text-white px-4 hover:bg-green-600 transition">
Send
</button>
</div>

</div>

<script>
// Chatbot
const webhook="https://ljv8502d6t.app.n8n.cloud/webhook/bf0bef5c-a54b-448e-8658-e46bfe31bf90/chat"
const chatWindow=document.getElementById("chatWindow")
const chatToggle=document.getElementById("chatToggle")
chatToggle.onclick=toggleChat

function toggleChat(){
  chatWindow.classList.toggle("hidden")
}

async function sendMessage(){
  let input=document.getElementById("chatInput")
  let chat=document.getElementById("chatBox")
  let message=input.value
  if(message.trim()=="") return
  chat.innerHTML+=`<p class="mb-1"><b>You:</b> ${message}</p>`
  input.value=""
  try{
    let response=await fetch(webhook,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:message})
    })
    let data=await response.text()
    chat.innerHTML+=`<p class="mb-2 text-green-700"><b>Bot:</b> ${data}</p>`
  }catch{
    chat.innerHTML+=`<p class="mb-2 text-red-600"><b>Bot:</b> Not reachable</p>`
  }
  chat.scrollTop=chat.scrollHeight
}

// Form submission
const form = document.getElementById("healthForm")
form.addEventListener("submit", async function(e){
  e.preventDefault()
  const formData = new FormData(form)

  const response = await fetch("/predict",{
    method:"POST",
    body: formData
  })

  const data = await response.json() // JSON from Flask

  // Show results section
  const results = document.getElementById("resultsSection")
  results.classList.remove("hidden")

  document.getElementById("bmiValue").textContent = data.bmi
  document.getElementById("predictionValue").textContent = data.result
  document.getElementById("confidenceValue").textContent = data.probability.toFixed(2)
  document.getElementById("confidenceBar").style.width = (data.probability*100)+"%"
  document.getElementById("accuracyValue").textContent = data.accuracy + "%"
  document.getElementById("accuracyBar").style.width = data.accuracy+"%"

  // Feature importance chart
  const ctx = document.getElementById("featureChart").getContext("2d")
  new Chart(ctx,{
    type:"bar",
    data:{
      labels: Object.keys(data.features),
      datasets:[{
        label:"Feature Importance",
        data: Object.values(data.features),
        backgroundColor:"rgba(128,0,128,0.6)"
      }]
    },
    options:{indexAxis:"y", responsive:true, plugins:{legend:{display:false}}}
  })

  // Confusion matrix table
  const table = document.getElementById("confusionTable")
  table.innerHTML = ""
  data.confusion.forEach(row=>{
    const tr = document.createElement("tr")
    row.forEach(cell=>{
      const td = document.createElement("td")
      td.textContent = cell
      td.className = "border border-gray-400 p-1"
      tr.appendChild(td)
    })
    table.appendChild(tr)
  })
})
</script>

</body>
</html>
